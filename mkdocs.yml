site_name: hypokrates
site_description: Cross-reference pharmacovigilance data for medical hypothesis generation
site_url: https://hypokrates.dev/docs
repo_url: https://github.com/brunoescalhao/hypokrates
repo_name: brunoescalhao/hypokrates

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
  - API Reference:
      - FAERS: api/faers.md
      - Signal Detection: api/stats.md
      - PubMed: api/pubmed.md
      - Cross-Reference: api/cross.md
      - Scan: api/scan.md
      - Vocab: api/vocab.md
      - Evidence: api/evidence.md
  - Data Sources:
      - Overview: sources/index.md
      - FAERS: sources/faers.md
      - PubMed: sources/pubmed.md
  - Concepts:
      - Signal Detection: concepts/signal-detection.md
      - Hypothesis Generation: concepts/hypothesis.md
  - Guides:
      - Configuration: guides/configuration.md
      - Async & Sync: guides/async.md
      - Error Handling: guides/errors.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brunoescalhao/hypokrates
